name: Build TWRP with Gem

on:
  workflow_dispatch: # Biar bisa di-klik manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Cleaning Storage
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean

    - name: Install Tools Build
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential tar libssl-dev libffi-dev \
        python-is-python3 gcc-multilib g++-multilib git gnupg gperf \
        imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev \
        liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev \
        libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
        xsltproc zip zlib1g-dev

    - name: Install Repo Tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Repo Sync
      run: |
        mkdir ~/twrp
        cd ~/twrp
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11
        repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Building
      run: |
        chmod +x build.sh
        ./build.sh
      shell: bash

    - name: Set Date Variable
      id: date
      run: echo "::set-output name=date::$(date +'%Y.%m.%d-%H%M')"

    - name: GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: TWRP-A02-${{ steps.date.outputs.date }}
        name: TWRP Samsung A02 Build ${{ steps.date.outputs.date }}
        body: |
          ### TWRP Recovery for Samsung A02 (SM-A022F)
          - **Build Date:** ${{ steps.date.outputs.date }}
          - **Status:** Stable / Success
          - **Size:** 22MB
          - **Features:** Include DTB & DTBO fix
        files: output/recovery.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
