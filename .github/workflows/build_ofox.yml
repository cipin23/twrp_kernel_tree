name: Build OrangeFox
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift
        docker system prune -a -f

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync OrangeFox Source
      run: |
        mkdir ofox
        cd ofox
        git config --global user.name "rdbckp"
        git config --global user.email "rdbckp@github.com"
        repo init --depth=1 -u https://gitlab.com/OrangeFox/Manifest.git -b 11.0
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd ofox
        git clone https://github.com/rdbckp/twrp_kernel_tree -b main device/samsung/a02

    - name: Build OrangeFox
      run: |
        cd ofox
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export FOX_VERSION="R11.1"
        export LC_ALL="C"
        lunch twrp_a02-eng
        mka recoveryimage -j$(nproc --all)

    - name: Upload OrangeFox to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OFOX-A02-Build
        path: ofox/out/target/product/a02/OrangeFox-*.img
