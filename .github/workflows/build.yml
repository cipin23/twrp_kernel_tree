name: Build TWRP
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup Space (Extreme)
      run: |
        # Hapus folder raksasa bawaan runner
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/share/swift
        sudo rm -rf /usr/local/lib/node_modules
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/local/lib/php
        
        # Bersihkan Docker dan Apt
        docker system prune -a -f
        sudo apt-get clean
        
        # Cek sisa space (buat pantau di log)
        df -h

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize & Sync TWRP Source
      run: |
        mkdir twrp
        cd twrp
        git config --global user.name "rdbckp"
        git config --global user.email "rdbckp@github.com"
        # Gunakan depth=1 buat hemat space
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11
        # Sync hanya yang perlu saja
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd twrp
        git clone https://github.com/rdbckp/twrp_kernel_tree -b main device/samsung/a02

    - name: Build Recovery Image
      run: |
        cd twrp
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_a02-eng
        # Gunakan mka untuk optimasi build
        mka recoveryimage -j$(nproc --all)

    - name: Upload Recovery
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-A02-Build
        path: twrp/out/target/product/a02/recovery.img
